<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f1f5f9" font-size="16" font-weight="bold">ECS Deployment Architecture</text>

  <!-- Local Machine Box -->
  <rect x="30" y="60" width="160" height="140" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="110" y="82" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1">LOCAL MACHINE</text>
  <rect x="50" y="92" width="120" height="34" rx="3" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="110" y="113" text-anchor="middle" fill="#f97316" font-size="11">Dockerfile</text>
  <rect x="50" y="134" width="120" height="34" rx="3" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="110" y="155" text-anchor="middle" fill="#f97316" font-size="11">index.html</text>
  <rect x="50" y="176" width="120" height="14" rx="2" fill="#f97316"/>
  <text x="110" y="187" text-anchor="middle" fill="#0d1117" font-size="9" font-weight="bold">docker build</text>

  <!-- Arrow 1: docker build to image -->
  <line x1="190" y1="130" x2="240" y2="130" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="240,125 250,130 240,135" fill="#f97316"/>
  <text x="215" y="122" text-anchor="middle" fill="#64748b" font-size="9">build</text>

  <!-- Docker Image Box -->
  <rect x="250" y="95" width="130" height="70" rx="4" fill="#0f172a" stroke="#38bdf8" stroke-width="1"/>
  <text x="315" y="116" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1">DOCKER IMAGE</text>
  <text x="315" y="138" text-anchor="middle" fill="#38bdf8" font-size="12">my-webpage</text>
  <text x="315" y="155" text-anchor="middle" fill="#475569" font-size="10">:latest</text>

  <!-- Arrow 2: tag + push -->
  <line x1="380" y1="130" x2="430" y2="130" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="430,125 440,130 430,135" fill="#38bdf8"/>
  <text x="405" y="118" text-anchor="middle" fill="#64748b" font-size="9">tag</text>
  <text x="405" y="145" text-anchor="middle" fill="#64748b" font-size="9">push</text>

  <!-- ECR Box -->
  <rect x="440" y="60" width="160" height="140" rx="4" fill="#0f172a" stroke="#4ade80" stroke-width="1"/>
  <text x="520" y="82" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1">ECR</text>
  <text x="520" y="100" text-anchor="middle" fill="#4ade80" font-size="11">Elastic Container</text>
  <text x="520" y="116" text-anchor="middle" fill="#4ade80" font-size="11">Registry</text>
  <rect x="460" y="126" width="120" height="30" rx="3" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="520" y="145" text-anchor="middle" fill="#4ade80" font-size="10">my-webpage:latest</text>
  <text x="520" y="178" text-anchor="middle" fill="#475569" font-size="9">Image stored here</text>

  <!-- Arrow 3: ECR to ECS -->
  <line x1="600" y1="130" x2="650" y2="130" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="650,125 660,130 650,135" fill="#4ade80"/>
  <text x="625" y="120" text-anchor="middle" fill="#64748b" font-size="9">pulls</text>
  <text x="625" y="145" text-anchor="middle" fill="#64748b" font-size="9">image</text>

  <!-- ECS Cluster Box -->
  <rect x="660" y="50" width="210" height="320" rx="4" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="72" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1">ECS CLUSTER</text>

  <!-- Fargate label -->
  <rect x="680" y="82" width="170" height="22" rx="3" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="97" text-anchor="middle" fill="#a78bfa" font-size="10">AWS Fargate</text>

  <!-- Task Definition -->
  <rect x="680" y="114" width="170" height="70" rx="3" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="131" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">TASK DEFINITION</text>
  <text x="765" y="149" text-anchor="middle" fill="#e2e8f0" font-size="10">CPU: 0.25 vCPU</text>
  <text x="765" y="165" text-anchor="middle" fill="#e2e8f0" font-size="10">Memory: 0.5 GB</text>
  <text x="765" y="179" text-anchor="middle" fill="#e2e8f0" font-size="10">Image: ECR URI</text>

  <!-- Service -->
  <rect x="680" y="196" width="170" height="50" rx="3" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="213" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">SERVICE</text>
  <text x="765" y="231" text-anchor="middle" fill="#e2e8f0" font-size="10">Desired tasks: 1</text>
  <text x="765" y="247" text-anchor="middle" fill="#e2e8f0" font-size="9">Auto-restarts on crash</text>

  <!-- Running Container -->
  <rect x="680" y="258" width="170" height="50" rx="3" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="765" y="275" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">RUNNING CONTAINER</text>
  <text x="765" y="293" text-anchor="middle" fill="#4ade80" font-size="10">nginx serving HTML</text>
  <text x="765" y="309" text-anchor="middle" fill="#4ade80" font-size="9">Port 80</text>

  <!-- Security Group note -->
  <rect x="680" y="320" width="170" height="30" rx="3" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="765" y="337" text-anchor="middle" fill="#f97316" font-size="9">SG: Allow HTTP port 80</text>
  <text x="765" y="350" text-anchor="middle" fill="#f97316" font-size="9">from 0.0.0.0/0</text>

  <!-- Arrow down from container to public IP -->
  <line x1="765" y1="380" x2="765" y2="420" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="760,420 765,430 770,420" fill="#4ade80"/>

  <!-- Public IP Box -->
  <rect x="660" y="430" width="210" height="50" rx="4" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="765" y="450" text-anchor="middle" fill="#64748b" font-size="9" letter-spacing="1">PUBLIC ACCESS</text>
  <text x="765" y="468" text-anchor="middle" fill="#4ade80" font-size="11">http://&lt;public-ip&gt;</text>

  <!-- Browser icon area -->
  <rect x="30" y="430" width="580" height="50" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="320" y="450" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1">BROWSER</text>
  <text x="320" y="468" text-anchor="middle" fill="#e2e8f0" font-size="11">Hello World from Hussain Ashfaque</text>

  <!-- Arrow from browser to public IP -->
  <line x1="610" y1="455" x2="655" y2="455" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="655,450 665,455 655,460" fill="#334155"/>

  <!-- Bottom accent line -->
  <rect x="0" y="515" width="900" height="3" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
